name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Deploy via rsync over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_APP_PATH: ${{ secrets.SSH_APP_PATH }}
        run: |
          sudo apt-get install -q -y sshpass rsync
          sshpass -p "$SSH_PASS" rsync -az --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.git' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            --exclude='storage/logs/' \
            --exclude='storage/app/public/' \
            --exclude='public/storage/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='tests/' \
            --exclude='*.log' \
            . "$SSH_USER@$SSH_HOST:$SSH_APP_PATH"

      - name: Clear Laravel cache via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_APP_PATH }}
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan optimize:clear
            php artisan migrate --force
