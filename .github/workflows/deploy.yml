name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql

      - name: Build assets
        run: npm ci && npm run build

      - name: Commit built assets
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f public/build/
          git diff --staged --quiet || git commit -m "ci: build assets [skip ci]"
          git push

      - name: Deploy via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_TOKEN
          script: |
            cd ${{ secrets.SSH_APP_PATH }}

            if [ ! -d .git ]; then
              git init -b main
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Mofio2021/barberortiz.git"
            fi

            git fetch "https://x-access-token:${GH_TOKEN}@github.com/Mofio2021/barberortiz.git" main
            git checkout -f FETCH_HEAD -- .

            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan optimize:clear
            php artisan migrate --force
