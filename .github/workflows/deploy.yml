name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build assets
        run: npm ci && npm run build

      - name: Deploy via lftp + artisan hook
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          sudo apt-get install -q -y lftp

          HOOK_TOKEN=$(openssl rand -hex 32)
          sed "s/__HOOK_TOKEN__/${HOOK_TOKEN}/" .github/deploy-runner.php > /tmp/_runner.php

          ftp_deploy() {
            lftp -e "
              set ftp:ssl-force true;
              set ftp:passive-mode true;
              set ssl:verify-certificate no;
              set net:timeout 45;
              set net:max-retries 3;
              set net:reconnect-interval-base 15;
              set net:reconnect-interval-multiplier 2;
              open -u $FTP_USER,$FTP_PASS $FTP_HOST;
              mirror --reverse --no-perms --parallel=3 \
                --exclude-glob .git* \
                --exclude-glob node_modules/ \
                --exclude-glob vendor/ \
                --exclude-glob storage/framework/cache/ \
                --exclude-glob storage/framework/sessions/ \
                --exclude-glob storage/framework/views/ \
                --exclude-glob storage/logs/ \
                --exclude-glob storage/app/public/ \
                --exclude-glob public/storage/ \
                --exclude-glob .env* \
                --exclude-glob tests/ \
                --exclude-glob *.log \
                . $SERVER_PATH;
              put /tmp/_runner.php -o ${SERVER_PATH}public/_runner.php;
              quit
            "
          }

          for attempt in 1 2 3; do
            echo "=== Intento FTP #${attempt} ==="
            if ftp_deploy; then
              echo "FTP OK en intento #${attempt}"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Fallo — esperando 45s antes de reintentar..."
              sleep 45
            else
              echo "Los 3 intentos fallaron."
              exit 1
            fi
          done

          echo "Ejecutando artisan en servidor..."
          curl -f \
            -H "X-Deploy-Token: ${HOOK_TOKEN}" \
            --max-time 180 \
            "${APP_URL}/_runner.php" || echo "Artisan hook no disponible — correr migraciones manualmente si hay cambios de BD"
