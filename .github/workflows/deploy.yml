name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql

      - name: Build assets
        run: npm ci && npm run build

      - name: Deploy via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          sudo apt-get install -q -y lftp
          lftp -e "
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set net:reconnect-interval-multiplier 1;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror --reverse --no-perms --parallel=4 \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              --exclude-glob vendor/ \
              --exclude-glob storage/framework/cache/ \
              --exclude-glob storage/framework/sessions/ \
              --exclude-glob storage/framework/views/ \
              --exclude-glob storage/logs/ \
              --exclude-glob storage/app/public/ \
              --exclude-glob public/storage/ \
              --exclude-glob .env* \
              --exclude-glob tests/ \
              --exclude-glob *.log \
              --exclude-glob deploy-hook.php \
              . $SERVER_PATH;
            quit
          "

      - name: Post-deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_APP_PATH }}
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan optimize:clear
            php artisan migrate --force
