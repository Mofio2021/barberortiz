name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Empaquetar archivos (excluir vendor, node_modules, etc.)
        run: |
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='vendor' \
              --exclude='storage/framework/cache' \
              --exclude='storage/framework/sessions' \
              --exclude='storage/framework/views' \
              --exclude='storage/logs' \
              --exclude='storage/app/public' \
              --exclude='public/storage' \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='tests' \
              -czf /tmp/deploy.tar.gz .

      - name: Subir archivo via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "/tmp/deploy.tar.gz"
          target: "/tmp/"

      - name: Extraer y activar en servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            tar -xzf /tmp/deploy.tar.gz -C ${{ secrets.SSH_APP_PATH }}
            rm /tmp/deploy.tar.gz
            cd ${{ secrets.SSH_APP_PATH }}
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan optimize:clear
            php artisan migrate --force
