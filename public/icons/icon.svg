<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Tijeras (scissors) simplificadas -->
  <g transform="translate(256,220)" stroke="#1f2937" stroke-width="22"
     fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pivote -->
    <circle cx="0" cy="0" r="18" fill="#1f2937" stroke="none"/>
    <!-- Hoja izquierda -->
    <line x1="-6" y1="-12" x2="-110" y2="-130"/>
    <circle cx="-120" cy="-142" r="34" fill="none"/>
    <!-- Hoja derecha -->
    <line x1="6" y1="-12" x2="110" y2="-130"/>
    <circle cx="120" cy="-142" r="34" fill="none"/>
    <!-- Mangos izquierdo -->
    <line x1="-6" y1="12" x2="-90" y2="120"/>
    <ellipse cx="-100" cy="140" rx="28" ry="20" transform="rotate(-40 -100 140)" fill="none"/>
    <!-- Mangos derecho -->
    <line x1="6" y1="12" x2="90" y2="120"/>
    <ellipse cx="100" cy="140" rx="28" ry="20" transform="rotate(40 100 140)" fill="none"/>
  </g>

  <!-- Texto "BO" -->
  <text x="256" y="460"
        text-anchor="middle"
        font-size="80"
        font-family="Georgia, serif"
        font-weight="bold"
        letter-spacing="8"
        fill="#1f2937">BO</text>
</svg>
